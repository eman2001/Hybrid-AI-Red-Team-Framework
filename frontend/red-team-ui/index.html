<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RED TEAM AI — Rule-Based Orchestrator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ══ SIDEBAR ══ -->
  <aside id="sidebar">
    <div class="sb-logo">
      <div class="title">⬡ RED TEAM AI</div>
      <div class="sub">Rule-Based Orchestrator</div>
    </div>

    <div class="sb-session">
      <div class="sb-section-label">Active Session</div>
      <div class="mono" style="font-size:12px;color:var(--blue)" id="sb-session-id">SIM-A3F9</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px" id="sb-target">192.168.1.100</div>
      <div style="margin-top:8px">
        <span class="pill">
          <span class="pill-dot" style="background:var(--low)"></span>
          <span class="mono" style="font-size:11px;color:var(--low);text-transform:uppercase;letter-spacing:1px">DONE</span>
        </span>
      </div>
      <div class="progress-wrap"><div class="progress-fill" style="width:100%"></div></div>
    </div>

    <nav id="nav"></nav>

    <div class="sb-footer">
      <div style="color:var(--high)">⚖ RISK_THRESHOLD = 0.30</div>
      <div>UCAS Cyber Security 2026</div>
      <div style="margin-top:4px">⚠ AUTHORIZED USE ONLY</div>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <main>
    <div class="page-header">
      <div>
        <div class="page-title" id="page-title">Dashboard</div>
        <div class="page-sub">Session SIM-A3F9 · 192.168.1.100 · Demo Mode</div>
      </div>
      <div class="backend-badge">Connect backend → localhost:8000</div>
    </div>

    <!-- Dashboard -->
    <div class="view active" id="view-dashboard"></div>

    <!-- New Session -->
    <div class="view" id="view-new"></div>

    <!-- Hosts -->
    <div class="view" id="view-hosts"></div>

    <!-- Vulns -->
    <div class="view" id="view-vulns"></div>

    <!-- Exploits -->
    <div class="view" id="view-exploits"></div>

    <!-- Post-Exploit (NEW) -->
    <div class="view" id="view-postexploit"></div>

    <!-- AI Classifier (NEW) -->
    <div class="view" id="view-ai"></div>

    <!-- MITRE -->
    <div class="view" id="view-mitre"></div>

    <!-- Attack Chain (NEW) -->
    <div class="view" id="view-chain"></div>

    <!-- Threat Intel (NEW) -->
    <div class="view" id="view-threatintel"></div>

    <!-- Adversary (NEW) -->
    <div class="view" id="view-adversary"></div>

    <!-- Attack Graph (NEW) -->
    <div class="view" id="view-graph"></div>

    <!-- Rules -->
    <div class="view" id="view-rules"></div>

    <!-- Logs -->
    <div class="view" id="view-logs"></div>
  </main>

  <!-- ══ SCRIPTS (order matters) ══ -->
  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/session.js"></script>
  <script src="js/views/hosts.js"></script>
  <script src="js/views/vulns.js"></script>
  <script src="js/views/exploits.js"></script>
  <script src="js/views/postexploit.js"></script>
  <script src="js/views/ai.js"></script>
  <script src="js/views/mitre.js"></script>
  <script src="js/views/chain.js"></script>
  <script src="js/views/threatintel.js"></script>
  <script src="js/views/adversary.js"></script>
  <script src="js/views/graph.js"></script>
  <script src="js/views/rules.js"></script>
  <script src="js/views/logs.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
